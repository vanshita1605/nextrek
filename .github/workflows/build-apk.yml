name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd mobile/nextrek
        npm install

    - name: Setup Expo CLI
      run: npm install -g @expo/cli

    - name: Build APK
      run: |
        cd mobile/nextrek
        expo build:android --type apk --no-publish --no-wait
      env:
        EXPO_CLI_USERNAME: ${{ secrets.EXPO_CLI_USERNAME }}
        EXPO_CLI_PASSWORD: ${{ secrets.EXPO_CLI_PASSWORD }}

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: apk-build
        path: mobile/nextrek/*.apk